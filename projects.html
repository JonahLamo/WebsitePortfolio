<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="Scripts/prj.css" />
  </head>

  <body>

    <header class="top-bar">
      <span class="top-link active-page">Projects</span>
      <a href="index.html" class="top-link">About Me</a>
    </header>

    <div class="page-wrapper">

      <!-- FILTER BAR -->
      <div class="filter-card">
        <span class="filter-label">Filter by category</span>
        <div class="filter-btns" id="filterBtns"></div>
      </div>

      <!-- PROJECT GRID -->
      <div class="project-grid" id="projectGrid">
        <button class="show-more-btn prj-card" id="showMoreBtn">
          <span id="showMoreLabel">＋ More Projects</span>
        </button>
      </div>

    </div>

    <!-- PROJECT DETAIL OVERLAY -->
    <div class="detail-overlay" id="detailOverlay" aria-hidden="true">
      <div class="detail-panel" id="detailPanel">
        <button class="detail-close" id="detailClose" aria-label="Close">&#x2715;</button>
        <div id="detailContent"></div>
      </div>
    </div>

    <footer class="footer">
      <p id="footerTxt">© 2025 Jonah. All rights reserved.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="Scripts/prj.js"></script>
  </body>
</html>
